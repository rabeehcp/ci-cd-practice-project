name: React CI

on: # for setting an event in these branches
  push:
    branches: ["main"]
  pull_request:  
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4 

      - name: Setup Node.js  
        uses: actions/setup-node@v4  
        with:
          node-version: '20.x' 
          
      - name: install dependencies  
        run: npm install 

      - name: build react app 
        run: npm run build  

      - name: run tests
        run: npm run test  
