name: React CI

on: # for setting an event in these branches
  push:
    branches: ["main"]
  pull_request:  
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4 

      - name: Setup Node.js  
        uses: actions/setup-node@v4  
        with:
          node-version: '20.x' 

      - name: install dependencies  
        run: npm install 

      - name: build react app 
        run: npm run build  

      - name: run tests
        run: npm run test  
  
  docker-build-and-push:  
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Docker login to Docker Hub  
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_TOKEN }}"

      - name: Build Docker image  
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}/simple-react-app:latest"

      - name: Push Docker image to Docker Hub 
        run: docker push "${{ secrets.DOCKER_USERNAME }}/simple-react-app:latest"